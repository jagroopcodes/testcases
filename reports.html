<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reports - Test Case Manager</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h5><i class="bi bi-check2-square me-2"></i>TestCase Manager</h5>
      <small>QA Portfolio Project</small>
    </div>
    <nav class="nav flex-column mt-2">
      <a class="nav-link" href="index.html">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
      <a class="nav-link" href="projects.html">
        <i class="bi bi-folder"></i> Projects
      </a>
      <a class="nav-link" href="testcases.html">
        <i class="bi bi-list-check"></i> Test Cases
      </a>
      <a class="nav-link active" href="reports.html">
        <i class="bi bi-bar-chart"></i> Reports
      </a>
      <a class="nav-link" href="settings.html">
        <i class="bi bi-gear"></i> Settings
      </a>
    </nav>
  </aside>

  <!-- ===== Sidebar Overlay (Mobile) ===== -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ===== Main Content ===== -->
  <div class="main-content">

    <!-- ===== Top Navbar ===== -->
    <header class="top-navbar">
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>
        <h1 class="page-title">Reports</h1>
      </div>
      <div class="navbar-right">
        <button class="btn btn-sm btn-outline-secondary" id="themeToggle" title="Toggle Theme">
          <i class="bi bi-moon-fill"></i>
        </button>
      </div>
    </header>

    <!-- ===== Content Area ===== -->
    <div class="content-area">

      <!-- Summary Cards -->
      <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
          <div class="stat-card primary">
            <div class="d-flex align-items-center gap-3">
              <div class="stat-icon">
                <i class="bi bi-list-check"></i>
              </div>
              <div>
                <div class="stat-number" id="reportTotalTests">0</div>
                <div class="stat-label">Total Tests</div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card success">
            <div class="d-flex align-items-center gap-3">
              <div class="stat-icon">
                <i class="bi bi-check-circle"></i>
              </div>
              <div>
                <div class="stat-number" id="reportPassed">0</div>
                <div class="stat-label">Passed</div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card danger">
            <div class="d-flex align-items-center gap-3">
              <div class="stat-icon">
                <i class="bi bi-x-circle"></i>
              </div>
              <div>
                <div class="stat-number" id="reportFailed">0</div>
                <div class="stat-label">Failed</div>
              </div>
            </div>
          </div>
        </div>
        <div class="col-6 col-md-3">
          <div class="stat-card warning">
            <div class="d-flex align-items-center gap-3">
              <div class="stat-icon">
                <i class="bi bi-clock"></i>
              </div>
              <div>
                <div class="stat-number" id="reportPending">0</div>
                <div class="stat-label">Pending / Other</div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <!-- Progress Section -->
      <div class="card">
        <div class="card-header">
          <i class="bi bi-bar-chart me-2"></i>Progress Overview
        </div>
        <div class="card-body" id="reportProgress">
          <!-- Populated by report.js -->
        </div>
      </div>

    </div>
  </div>

  <!-- ===== Shared Delete Confirmation Modal ===== -->
  <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirm Delete</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">Are you sure you want to delete this item?</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Scripts ===== -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/report.js"></script>

</body>
</html>
