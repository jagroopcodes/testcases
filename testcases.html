<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Cases - Test Case Manager</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h5><i class="bi bi-check2-square me-2"></i>TestCase Manager</h5>
      <small>QA Portfolio Project</small>
    </div>
    <nav class="nav flex-column mt-2">
      <a class="nav-link" href="index.html">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
      <a class="nav-link" href="projects.html">
        <i class="bi bi-folder"></i> Projects
      </a>
      <a class="nav-link active" href="testcases.html">
        <i class="bi bi-list-check"></i> Test Cases
      </a>
      <a class="nav-link" href="reports.html">
        <i class="bi bi-bar-chart"></i> Reports
      </a>
      <a class="nav-link" href="settings.html">
        <i class="bi bi-gear"></i> Settings
      </a>
    </nav>
  </aside>

  <!-- ===== Sidebar Overlay (Mobile) ===== -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ===== Main Content ===== -->
  <div class="main-content">

    <!-- ===== Top Navbar ===== -->
    <header class="top-navbar">
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>
        <h1 class="page-title">Test Cases</h1>
      </div>
      <div class="navbar-right">
        <button class="btn btn-sm btn-outline-secondary" id="themeToggle" title="Toggle Theme">
          <i class="bi bi-moon-fill"></i>
        </button>
      </div>
    </header>

    <!-- ===== Content Area ===== -->
    <div class="content-area">

      <!-- Toolbar: Search + Filter + Add -->
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div class="d-flex flex-wrap align-items-center gap-2">
          <div class="search-bar" style="max-width: 260px; width: 100%;">
            <i class="bi bi-search search-icon"></i>
            <input type="text" class="form-control" id="testCaseSearch" placeholder="Search test cases...">
          </div>
          <select class="form-select" id="testCaseFilter" style="max-width: 170px;">
            <option value="">All Status</option>
            <option value="Passed">Passed</option>
            <option value="Failed">Failed</option>
            <option value="Pending">Pending</option>
            <option value="In Progress">In Progress</option>
            <option value="Blocked">Blocked</option>
          </select>
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#testCaseModal">
          <i class="bi bi-plus-lg"></i> Add Test Case
        </button>
      </div>

      <!-- Test Cases Table -->
      <div class="card">
        <div class="card-header">
          <i class="bi bi-list-check me-2"></i>All Test Cases
        </div>
        <div class="card-body p-0">
          <div class="table-container">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>ID</th>
                  <th>Title</th>
                  <th>Module</th>
                  <th>Priority</th>
                  <th>Status</th>
                  <th style="width: 120px;">Actions</th>
                </tr>
              </thead>
              <tbody id="testCaseTableBody">
                <!-- Populated by testcase.js -->
              </tbody>
            </table>
          </div>
          <!-- Empty State -->
          <div id="testCaseEmptyState" class="empty-state">
            <i class="bi bi-inbox"></i>
            <h6>No test cases yet</h6>
            <p>Create your first test case to get started.</p>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#testCaseModal">
              <i class="bi bi-plus-lg"></i> Add Test Case
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ===== Add / Edit Test Case Modal ===== -->
  <div class="modal fade" id="testCaseModal" tabindex="-1">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="testCaseModalLabel">Add Test Case</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="testCaseForm" novalidate>
          <div class="modal-body">
            <input type="hidden" id="editTestCaseId" value="">

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="tcTitle" class="form-label">Title <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="tcTitle" placeholder="e.g. Login with valid credentials" required>
              </div>
              <div class="col-md-6 mb-3">
                <label for="tcModule" class="form-label">Module <span class="text-danger">*</span></label>
                <input type="text" class="form-control" id="tcModule" placeholder="e.g. Authentication" required>
              </div>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label for="tcPriority" class="form-label">Priority</label>
                <select class="form-select" id="tcPriority">
                  <option value="High">High</option>
                  <option value="Medium" selected>Medium</option>
                  <option value="Low">Low</option>
                </select>
              </div>
              <div class="col-md-6 mb-3">
                <label for="tcStatus" class="form-label">Status</label>
                <select class="form-select" id="tcStatus">
                  <option value="Pending">Pending</option>
                  <option value="In Progress">In Progress</option>
                  <option value="Passed">Passed</option>
                  <option value="Failed">Failed</option>
                  <option value="Blocked">Blocked</option>
                </select>
              </div>
            </div>

            <div class="mb-3">
              <label for="tcSteps" class="form-label">Test Steps <span class="text-danger">*</span></label>
              <textarea class="form-control" id="tcSteps" rows="3" placeholder="1. Open the app&#10;2. Enter credentials&#10;3. Click Login" required></textarea>
            </div>

            <div class="mb-3">
              <label for="tcExpected" class="form-label">Expected Result <span class="text-danger">*</span></label>
              <textarea class="form-control" id="tcExpected" rows="2" placeholder="User should be logged in successfully" required></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Test Case</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== Shared Delete Confirmation Modal ===== -->
  <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirm Delete</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">Are you sure you want to delete this item?</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Scripts ===== -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/testcase.js"></script>

</body>
</html>
