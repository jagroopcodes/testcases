<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects - Test Case Manager</title>
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <!-- Custom CSS -->
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- ===== Sidebar ===== -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h5><i class="bi bi-check2-square me-2"></i>TestCase Manager</h5>
      <small>QA Portfolio Project</small>
    </div>
    <nav class="nav flex-column mt-2">
      <a class="nav-link" href="index.html">
        <i class="bi bi-speedometer2"></i> Dashboard
      </a>
      <a class="nav-link active" href="projects.html">
        <i class="bi bi-folder"></i> Projects
      </a>
      <a class="nav-link" href="testcases.html">
        <i class="bi bi-list-check"></i> Test Cases
      </a>
      <a class="nav-link" href="reports.html">
        <i class="bi bi-bar-chart"></i> Reports
      </a>
      <a class="nav-link" href="settings.html">
        <i class="bi bi-gear"></i> Settings
      </a>
    </nav>
  </aside>

  <!-- ===== Sidebar Overlay (Mobile) ===== -->
  <div class="sidebar-overlay" id="sidebarOverlay"></div>

  <!-- ===== Main Content ===== -->
  <div class="main-content">

    <!-- ===== Top Navbar ===== -->
    <header class="top-navbar">
      <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm btn-outline-secondary d-md-none" id="sidebarToggle">
          <i class="bi bi-list"></i>
        </button>
        <h1 class="page-title">Projects</h1>
      </div>
      <div class="navbar-right">
        <button class="btn btn-sm btn-outline-secondary" id="themeToggle" title="Toggle Theme">
          <i class="bi bi-moon-fill"></i>
        </button>
      </div>
    </header>

    <!-- ===== Content Area ===== -->
    <div class="content-area">

      <!-- Toolbar -->
      <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 mb-4">
        <div class="search-bar" style="max-width: 320px; width: 100%;">
          <i class="bi bi-search search-icon"></i>
          <input type="text" class="form-control" id="projectSearch" placeholder="Search projects...">
        </div>
        <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#projectModal">
          <i class="bi bi-plus-lg"></i> Add Project
        </button>
      </div>

      <!-- Projects Table -->
      <div class="card">
        <div class="card-header">
          <i class="bi bi-folder me-2"></i>All Projects
        </div>
        <div class="card-body p-0">
          <div class="table-container">
            <table class="table table-hover mb-0">
              <thead>
                <tr>
                  <th>Project Name</th>
                  <th>Client</th>
                  <th>Status</th>
                  <th>Created Date</th>
                  <th style="width: 120px;">Actions</th>
                </tr>
              </thead>
              <tbody id="projectTableBody">
                <!-- Populated by project.js -->
              </tbody>
            </table>
          </div>
          <!-- Empty State -->
          <div id="projectEmptyState" class="empty-state">
            <i class="bi bi-folder-plus"></i>
            <h6>No projects yet</h6>
            <p>Create your first project to get started.</p>
            <button class="btn btn-primary btn-sm" data-bs-toggle="modal" data-bs-target="#projectModal">
              <i class="bi bi-plus-lg"></i> Add Project
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- ===== Add / Edit Project Modal ===== -->
  <div class="modal fade" id="projectModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="projectModalLabel">Add Project</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <form id="projectForm" novalidate>
          <div class="modal-body">
            <input type="hidden" id="editProjectId" value="">
            <div class="mb-3">
              <label for="projectName" class="form-label">Project Name <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="projectName" placeholder="e.g. E-Commerce App" required>
            </div>
            <div class="mb-3">
              <label for="projectClient" class="form-label">Client <span class="text-danger">*</span></label>
              <input type="text" class="form-control" id="projectClient" placeholder="e.g. ABC Corp" required>
            </div>
            <div class="mb-3">
              <label for="projectStatus" class="form-label">Status</label>
              <select class="form-select" id="projectStatus">
                <option value="Active">Active</option>
                <option value="Completed">Completed</option>
                <option value="On Hold">On Hold</option>
                <option value="Cancelled">Cancelled</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
            <button type="submit" class="btn btn-primary">Save Project</button>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- ===== Shared Delete Confirmation Modal ===== -->
  <div class="modal fade" id="confirmDeleteModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title"><i class="bi bi-exclamation-triangle text-danger me-2"></i>Confirm Delete</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">Are you sure you want to delete this item?</div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
          <button type="button" class="btn btn-danger" id="confirmDeleteBtn">Delete</button>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== Scripts ===== -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/app.js"></script>
  <script src="js/project.js"></script>

</body>
</html>
